services:
  postgres:
    image: postgres:16
    container_name: walletra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: walletra
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: wallet
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d

  bot:
    build: .
    container_name: walletra-bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres

volumes:
  pg_data:
